name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project NimTrainer.xcodeproj \
            -scheme NimTrainer \
            -destination "generic/platform=iOS" \
            -derivedDataPath /tmp/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package IPA
        run: |
          APP=$(find /tmp/DerivedData -name "NimTrainer.app" \
                  -not -path "*/Index.noindex/*" \
                  -not -path "*/SourcePackages/*" | head -1)
          echo "App path: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qr NimTrainer.ipa Payload
          rm -rf Payload
          echo "Done: $(du -sh NimTrainer.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NimTrainer-ipa
          path: NimTrainer.ipa
          retention-days: 14
